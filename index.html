<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌺 Hoa Viên</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --g9:#1a2e1e;--g7:#2d4a34;--g4:#5c8f66;--g1:#e8f4ea;--g0:#f4f8f4;
  --pk:#e8527a;--pkl:#fde8ef;--pkd:#c03060;
  --t9:#1a2010;--t6:#3d5240;--t4:#6b8070;--t2:#a8bfaa;
  --bd:#ddeadf;--wh:#fff;
  --r:12px;--rp:999px;
  --sh:0 2px 10px rgba(26,46,30,.09);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:var(--g0);color:var(--t9);min-height:100vh;font-size:15px}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}

/* layout */
.topbar{background:var(--g9);height:54px;display:flex;align-items:center;padding:0 16px;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.topbar-logo{font-size:1.1rem;font-weight:800;color:#fff;display:flex;align-items:center;gap:7px}
.topbar-space{flex:1}
.sync{display:flex;align-items:center;gap:5px;font-size:.75rem;color:#b8d9bc}
.dot{width:7px;height:7px;border-radius:50%;background:#5c8f66;transition:background .3s}
.dot.spin{background:#eab308;animation:pu 1s infinite}
.dot.err{background:#ef4444}
@keyframes pu{0%,100%{opacity:1}50%{opacity:.3}}

.wrap{max-width:860px;margin:0 auto;padding:18px 14px 80px}

/* nav tabs */
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px}
.tab{padding:7px 14px;border-radius:var(--rp);font-size:.82rem;font-weight:700;border:1.5px solid var(--bd);background:var(--wh);color:var(--t4);cursor:pointer;transition:all .15s;white-space:nowrap}
.tab:hover{border-color:var(--t2);color:var(--t6)}
.tab.on{background:var(--g9);color:#fff;border-color:var(--g9)}
.tab.pk{background:var(--pk);color:#fff;border-color:var(--pk)}

/* cards */
.card{background:var(--wh);border-radius:var(--r);border:1px solid var(--bd);box-shadow:var(--sh);padding:16px}
.card+.card{margin-top:12px}

/* flower grid */
.fgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
.fc{background:var(--wh);border-radius:var(--r);border:1.5px solid var(--bd);box-shadow:var(--sh);overflow:hidden;transition:transform .15s,box-shadow .15s}
.fc:hover{transform:translateY(-2px);box-shadow:0 5px 18px rgba(26,46,30,.13)}
.fc .img-wrap{width:100%;aspect-ratio:1;overflow:hidden;background:linear-gradient(135deg,var(--g1),var(--pkl));position:relative}
.fc .img-wrap img{width:100%;height:100%;object-fit:cover;transition:transform .3s}
.fc:hover .img-wrap img{transform:scale(1.06)}
.no-img{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px}
.no-img .letter{font-size:2.2rem;font-weight:800;line-height:1}
.no-img .lname{font-size:.72rem;font-weight:700;color:var(--t4);text-align:center;padding:0 6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.fc .fbody{padding:9px 10px 11px}
.fc .fname{font-size:.82rem;font-weight:700;line-height:1.3;margin-bottom:5px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:var(--rp);font-size:.68rem;font-weight:700;margin-bottom:5px}
.bdot{width:6px;height:6px;border-radius:50%}
.fcount{font-size:.7rem;color:var(--t4);font-weight:600;margin-bottom:2px}
.fowns{font-size:.68rem;color:var(--t2);line-height:1.5}

/* tick card */
.tc{cursor:pointer;user-select:none}
.tc.ticked{border-color:var(--pk);box-shadow:0 0 0 2px var(--pkl),var(--sh)}
.chk{position:absolute;top:6px;right:6px;width:22px;height:22px;border-radius:50%;background:rgba(255,255,255,.7);border:2px solid rgba(255,255,255,.8);display:flex;align-items:center;justify-content:center;font-size:12px;backdrop-filter:blur(2px);transition:all .15s}
.tc.ticked .chk{background:var(--pk);border-color:var(--pk);color:#fff}

/* group heading */
.gh{display:flex;align-items:center;gap:9px;margin:24px 0 12px}
.gh-bar{width:4px;height:20px;border-radius:2px;flex-shrink:0}
.gh h2{font-size:1rem;font-weight:800}
.gh .cnt{font-size:.72rem;color:var(--t4);background:var(--g0);border:1px solid var(--bd);padding:2px 7px;border-radius:var(--rp);font-weight:600}

/* forms */
.fg{display:flex;flex-direction:column;gap:5px}
.fl{font-size:.78rem;font-weight:700;color:var(--t6)}
.fi{padding:9px 11px;border-radius:8px;border:1.5px solid var(--bd);background:var(--wh);font-family:inherit;font-size:.87rem;color:var(--t9);outline:none;transition:border-color .15s;width:100%}
.fi:focus{border-color:var(--g4)}
.fi::placeholder{color:var(--t2)}
select.fi{cursor:pointer}
.frow{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}

/* color picker */
.cpick{display:flex;gap:6px;flex-wrap:wrap}
.copt{padding:4px 11px;border-radius:var(--rp);border:2px solid var(--bd);cursor:pointer;font-size:.76rem;font-weight:700;color:var(--t4);background:var(--wh);transition:all .12s}

/* buttons */
.btn{display:inline-flex;align-items:center;gap:5px;padding:9px 16px;border-radius:8px;font-family:inherit;font-size:.84rem;font-weight:700;cursor:pointer;border:none;transition:all .14s}
.btn-g{background:var(--g7);color:#fff}.btn-g:hover{background:var(--g4)}
.btn-p{background:var(--pk);color:#fff}.btn-p:hover{background:var(--pkd)}
.btn-o{background:transparent;color:var(--t6);border:1.5px solid var(--bd)}.btn-o:hover{border-color:var(--t2)}
.btn-r{background:transparent;color:#ef4444;border:1.5px solid #fca5a5}.btn-r:hover{background:#fff0f0}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-sm{padding:6px 11px;font-size:.78rem}

/* search */
.sbar{position:relative;margin-bottom:16px}
.sbar input{padding-left:36px}
.sico{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--t2);pointer-events:none}

/* color filter */
.cfbar{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:18px}
.ctab{padding:4px 12px;border-radius:var(--rp);font-size:.76rem;font-weight:700;border:1.5px solid var(--bd);background:var(--wh);color:var(--t4);cursor:pointer;transition:all .13s}
.ctab:hover{border-color:var(--t2)}
.ctab.on{border-width:2px}

/* member table */
.mtbl{width:100%;border-collapse:collapse}
.mtbl th{text-align:left;font-size:.72rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--t4);padding:9px 12px;border-bottom:1.5px solid var(--bd)}
.mtbl td{padding:11px 12px;border-bottom:1px solid var(--g0);font-size:.87rem;vertical-align:middle}
.mtbl tr:hover td{background:var(--g1)}
.mbar-w{display:flex;align-items:center;gap:8px;min-width:100px}
.mbar{flex:1;height:6px;border-radius:3px;background:var(--g0);overflow:hidden}
.mbar-f{height:100%;border-radius:3px;background:var(--pk);transition:width .4s}
.mlbl{font-size:.76rem;font-weight:700;color:var(--pkd);white-space:nowrap}
.ibtn{background:none;border:none;cursor:pointer;padding:4px 6px;border-radius:6px;font-size:.9rem;transition:background .13s;color:var(--t4)}
.ibtn:hover{background:var(--g0)}
.ibtn.del:hover{background:#fff0f0;color:#ef4444}

/* stats */
.stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;margin-bottom:18px}
.scard{background:var(--wh);border-radius:var(--r);border:1px solid var(--bd);padding:13px 14px}
.sval{font-size:1.5rem;font-weight:800;line-height:1}
.slbl{font-size:.7rem;font-weight:700;color:var(--t4);margin-top:3px;text-transform:uppercase;letter-spacing:.04em}

/* save bar */
.savebar{position:fixed;bottom:0;left:0;right:0;background:var(--g9);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:11px 18px;z-index:90;box-shadow:0 -3px 16px rgba(0,0,0,.2);transform:translateY(100%);transition:transform .22s}
.savebar.on{transform:translateY(0)}

/* toast */
.toasts{position:fixed;top:62px;right:12px;z-index:999;display:flex;flex-direction:column;gap:7px;pointer-events:none}
.toast{background:var(--g9);color:#fff;padding:9px 14px;border-radius:8px;font-size:.82rem;font-weight:600;box-shadow:0 4px 16px rgba(0,0,0,.2);animation:tin .25s ease,tout .3s ease 2.1s forwards;pointer-events:auto}
.toast.ok{border-left:3px solid #22c55e}
.toast.er{border-left:3px solid #ef4444}
.toast.wn{border-left:3px solid #eab308}
@keyframes tin{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:none}}
@keyframes tout{from{opacity:1}to{opacity:0;transform:translateX(16px)}}

/* modal */
.mbg{position:fixed;inset:0;background:rgba(26,46,30,.4);z-index:500;display:flex;align-items:center;justify-content:center;padding:18px;opacity:0;pointer-events:none;transition:opacity .18s}
.mbg.on{opacity:1;pointer-events:auto}
.mbox{background:var(--wh);border-radius:var(--r);padding:22px;max-width:420px;width:100%;box-shadow:0 8px 36px rgba(26,46,30,.18);transform:scale(.95);transition:transform .18s;max-height:85vh;overflow-y:auto}
.mbg.on .mbox{transform:scale(1)}
.mttl{font-size:.98rem;font-weight:800;margin-bottom:10px}
.mbdy{font-size:.86rem;color:var(--t6);margin-bottom:16px;line-height:1.65}
.mft{display:flex;gap:7px;justify-content:flex-end;flex-wrap:wrap}

/* spinner */
.sp{display:inline-block;width:16px;height:16px;border:2px solid var(--bd);border-top-color:var(--g4);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{display:flex;align-items:center;justify-content:center;padding:52px;gap:10px;color:var(--t4);font-size:.87rem}

/* empty */
.empty{text-align:center;padding:40px 16px;color:var(--t2)}
.empty .ei{font-size:2.4rem;margin-bottom:9px}

/* setup */
.setup{max-width:480px;margin:40px auto;background:var(--wh);border-radius:var(--r);border:1px solid var(--bd);padding:28px;box-shadow:var(--sh)}
.setup h2{font-size:1.2rem;font-weight:800;margin-bottom:8px}
.setup p{font-size:.84rem;color:var(--t4);line-height:1.7;margin-bottom:14px}
.setup ol{padding-left:18px;font-size:.84rem;color:var(--t6);line-height:2.1}
.setup ol li{padding-left:4px}
.irow{display:flex;gap:8px;align-items:flex-end;margin-top:14px}
.irow .fi{flex:1}
code.tag{background:var(--g1);padding:1px 6px;border-radius:4px;font-size:.82em}

/* error box */
.errbox{max-width:460px;margin:40px auto;background:var(--wh);border-radius:var(--r);border:1.5px solid #fca5a5;padding:22px;box-shadow:var(--sh)}
.errbox h3{font-size:1rem;font-weight:800;color:#b91c1c;margin-bottom:8px}
.errbox p{font-size:.86rem;color:var(--t6);margin-bottom:14px;line-height:1.6}

@media(max-width:480px){
  .fgrid{grid-template-columns:repeat(auto-fill,minmax(135px,1fr))}
  .frow{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="toasts" id="toasts"></div>
<div class="mbg" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="mbox">
    <div class="mttl" id="mttl"></div>
    <div class="mbdy" id="mbdy"></div>
    <div class="mft"  id="mft"></div>
  </div>
</div>
<div class="savebar" id="savebar">
  <span style="font-size:.87rem;font-weight:600;color:#b8d9bc">Đã chọn <strong id="sbc" style="color:#fff">0</strong> hoa</span>
  <button class="btn btn-p" id="sbtn" onclick="saveTicks()">💾 Lưu</button>
</div>

<div class="topbar">
  <span style="font-size:1.3rem">🌺</span>
  <span class="topbar-logo">Hoa Viên</span>
  <div class="topbar-space"></div>
  <div class="sync"><div class="dot" id="dot"></div><span id="synclbl">Kết nối</span></div>
</div>

<div class="wrap" id="app"></div>

<script>
// ── CONFIG ──────────────────────────────────────────────────
const CK = 'hv2_url';
let URL = localStorage.getItem(CK) || '';

// ── STATE ───────────────────────────────────────────────────
let S = {
  flowers:[], members:[], ticks:{},
  loaded:false, err:null,
  page:'dash', fcolor:'all', fq:'',
  mid:'', msel:new Set(),
  admin:false,
};

// ── COLORS ──────────────────────────────────────────────────
const COLS = [
  {k:'tim',  l:'Tím',   h:'#8b5cf6'},
  {k:'cam',  l:'Cam',   h:'#f97316'},
  {k:'do',   l:'Đỏ',    h:'#ef4444'},
  {k:'vang', l:'Vàng',  h:'#eab308'},
  {k:'xanh', l:'Xanh',  h:'#22c55e'},
  {k:'hong', l:'Hồng',  h:'#ec4899'},
  {k:'trang',l:'Trắng', h:'#94a3b8'},
];
const CM = Object.fromEntries(COLS.map(c=>[c.k,c]));
const col = k => CM[k] || {k:'trang',l:k||'?',h:'#94a3b8'};

// ── SYNC DOT ────────────────────────────────────────────────
const dot = s => {
  const d=document.getElementById('dot');
  if(d) d.className='dot '+(s==='load'?'spin':s==='err'?'err':'');
};

// ── FETCH WITH TIMEOUT ──────────────────────────────────────
function ftch(url, opts={}, ms=12000) {
  const c=new AbortController();
  const t=setTimeout(()=>c.abort(),ms);
  return fetch(url,{...opts,signal:c.signal}).finally(()=>clearTimeout(t));
}

// ── SheetDB helpers ─────────────────────────────────────────
const base = tab => tab ? URL+'/sheets/'+encodeURIComponent(tab) : URL;

async function sGet(tab) {
  dot('load');
  try {
    const r = await ftch(base(tab));
    const txt = await r.text();
    dot('');
    const d = JSON.parse(txt);
    if(!Array.isArray(d)) { console.warn('sGet '+tab, d); return []; }
    return d;
  } catch(e) { dot('err'); console.error('sGet '+tab, e.message); return null; }
}

async function sPost(tab, data) {
  dot('load');
  try {
    const r = await ftch(base(tab), {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({data}),
    });
    dot(''); return await r.json();
  } catch(e) { dot('err'); return {error:e.message}; }
}

async function sPatch(tab, col, val, data) {
  dot('load');
  try {
    const r = await ftch(base(tab)+'/'+encodeURIComponent(col)+'/'+encodeURIComponent(val), {
      method:'PATCH',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({data}),
    });
    dot(''); return await r.json();
  } catch(e) { dot('err'); return {error:e.message}; }
}

async function sDel(tab, col, val) {
  dot('load');
  try {
    const r = await ftch(base(tab)+'/'+encodeURIComponent(col)+'/'+encodeURIComponent(val), {method:'DELETE'});
    dot(''); return await r.json();
  } catch(e) { dot('err'); return {error:e.message}; }
}

// ── LOAD ALL ────────────────────────────────────────────────
async function loadAll() {
  if(!URL){ S.loaded=true; return; }
  S.loaded=false; S.err=null;
  try {
    const [fl,mb,tk] = await Promise.all([sGet('Flowers'),sGet('Members'),sGet('Ticks')]);
    if(fl===null || mb===null || tk===null){
      S.err='Không kết nối được SheetDB. Kiểm tra URL hoặc header trong Sheets.';
      S.loaded=true; return;
    }
    S.flowers = fl.filter(r=>r.id&&r.name).map(r=>({
      id:r.id, name:r.name, color:r.color||'trang',
      imgUrl:r.imgUrl||'', sortOrder:Number(r.sortOrder)||0,
    })).sort((a,b)=>a.sortOrder-b.sortOrder);
    S.members = mb.filter(r=>r.id&&r.displayName).map(r=>({
      id:r.id, displayName:r.displayName, alias:r.alias||'', year:r.year||'',
    }));
    S.ticks={};
    tk.filter(r=>r.memberId).forEach(r=>{
      S.ticks[r.memberId] = r.flowerIds?r.flowerIds.split(',').filter(Boolean):[];
    });
    S.loaded=true;
  } catch(e) {
    S.err='Lỗi: '+e.message; S.loaded=true;
  }
}

// ── TOAST ───────────────────────────────────────────────────
function toast(msg, type='ok') {
  const el=document.createElement('div');
  el.className='toast '+type;
  el.textContent=(type==='ok'?'✅ ':type==='er'?'❌ ':'⚠️ ')+msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(()=>el.remove(),2600);
}

// ── MODAL ───────────────────────────────────────────────────
function openModal(t,b,f){
  document.getElementById('mttl').innerHTML=t;
  document.getElementById('mbdy').innerHTML=b;
  document.getElementById('mft').innerHTML=f;
  document.getElementById('modal').classList.add('on');
}
function closeModal(){ document.getElementById('modal').classList.remove('on'); }

// ── RENDER ──────────────────────────────────────────────────
function render() {
  const app=document.getElementById('app');
  if(!app) return;
  // save bar
  const sb=document.getElementById('savebar');
  if(S.page==='tick'&&S.mid){
    sb.classList.add('on');
    document.getElementById('sbc').textContent=S.msel.size;
  } else sb.classList.remove('on');

  if(!URL){ app.innerHTML=renderSetup(); return; }
  if(!S.loaded){ app.innerHTML='<div class="loading"><div class="sp"></div> Đang tải dữ liệu...</div>'; return; }
  if(S.err){ app.innerHTML=renderErr(); return; }

  app.innerHTML = renderTabs() + renderPage();
}

function renderTabs() {
  const tabs=[
    {id:'dash',icon:'🏠',l:'Tổng quan'},
    {id:'flowers',icon:'🌸',l:'Danh sách hoa'},
    {id:'tick',icon:'✅',l:'Tick hoa'},
    {id:'members',icon:'👥',l:'Thành viên'},
    {id:'settings',icon:'⚙️',l:'Cài đặt'},
  ];
  return '<div class="tabs">'+
    tabs.map(t=>`<button class="tab ${S.page===t.id?'on':''}" onclick="go('${t.id}')">${t.icon} ${t.l}</button>`).join('')+
    `<button class="tab ${S.admin?'pk':''}" onclick="toggleAdmin()">🛡️ ${S.admin?'Admin ON':'Admin'}</button>`+
  '</div>';
}

function renderPage() {
  if(S.page==='dash')     return pageDash();
  if(S.page==='flowers')  return pageFlowers();
  if(S.page==='tick')     return pageTick();
  if(S.page==='members')  return pageMembers();
  if(S.page==='settings') return pageSettings();
  return '';
}

function go(p){ S.page=p; render(); }
function toggleAdmin(){ S.admin=!S.admin; render(); }

// ── SETUP ───────────────────────────────────────────────────
function renderSetup() {
  return `<div class="setup">
    <h2>🌺 Chào mừng đến Hoa Viên!</h2>
    <p>Dữ liệu lưu trong Google Sheets qua <b>SheetDB</b>. 3 bước setup:</p>
    <ol>
      <li>Tạo Google Sheets mới → tạo 3 tab tên chính xác: <code class="tag">Flowers</code> <code class="tag">Members</code> <code class="tag">Ticks</code> (để trống)</li>
      <li>Vào <b>sheetdb.io</b> → đăng nhập Google → <b>Create new API</b> → chọn file Sheets → copy URL</li>
      <li>Dán URL vào đây → bấm <b>Kết nối</b></li>
    </ol>
    <div class="irow">
      <input class="fi" id="su" placeholder="https://sheetdb.io/api/v1/..." />
      <button class="btn btn-g" onclick="doConnect()">Kết nối</button>
    </div>
    <div id="su-msg" style="margin-top:10px;font-size:.82rem;color:var(--t4)"></div>
  </div>`;
}

async function doConnect() {
  const v=document.getElementById('su').value.trim();
  if(!v.startsWith('https://')){ toast('URL không hợp lệ','wn'); return; }
  URL=v; localStorage.setItem(CK,URL);
  document.getElementById('su-msg').textContent='⏳ Đang kết nối...';
  await loadAll();
  render();
}

// ── ERROR ───────────────────────────────────────────────────
function renderErr() {
  return `<div class="errbox">
    <h3>⚠️ Không tải được dữ liệu</h3>
    <p>${esc(S.err)}</p>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-g" onclick="retry()">🔄 Thử lại</button>
      <button class="btn btn-o" onclick="go('settings')">⚙️ Cài đặt</button>
      <button class="btn btn-o" onclick="showHeaderHelp()">🛠️ Xem header cần gõ</button>
    </div>
  </div>`;
}

async function retry(){ S.loaded=false; S.err=null; render(); await loadAll(); render(); }

function showHeaderHelp(){
  openModal('🛠️ Header cần gõ vào Sheets',
    '<b>Tab Flowers</b> — gõ vào hàng 1, mỗi từ 1 ô:<br>'+
    '<code style="display:block;background:#f1f5f1;padding:6px 10px;border-radius:6px;margin:5px 0 12px;font-size:.82rem">id &nbsp;|&nbsp; name &nbsp;|&nbsp; color &nbsp;|&nbsp; imgUrl &nbsp;|&nbsp; sortOrder</code>'+
    '<b>Tab Members</b>:<br>'+
    '<code style="display:block;background:#f1f5f1;padding:6px 10px;border-radius:6px;margin:5px 0 12px;font-size:.82rem">id &nbsp;|&nbsp; displayName &nbsp;|&nbsp; alias &nbsp;|&nbsp; year</code>'+
    '<b>Tab Ticks</b>:<br>'+
    '<code style="display:block;background:#f1f5f1;padding:6px 10px;border-radius:6px;margin:5px 0;font-size:.82rem">memberId &nbsp;|&nbsp; flowerIds</code>',
    '<button class="btn btn-g" onclick="closeModal();retry()">✅ Đã gõ xong, thử lại</button>'+
    '<button class="btn btn-o" onclick="closeModal()">Đóng</button>'
  );
}

// ── DASHBOARD ───────────────────────────────────────────────
function pageDash() {
  const ttl=S.flowers.length, tmb=S.members.length;
  const ttk=Object.values(S.ticks).reduce((s,a)=>s+a.length,0);
  const byC={};
  S.flowers.forEach(f=>{ byC[f.color]=(byC[f.color]||0)+1; });
  const sorted=[...S.members].sort((a,b)=>(S.ticks[b.id]||[]).length-(S.ticks[a.id]||[]).length);
  const max=Math.max(...sorted.map(m=>(S.ticks[m.id]||[]).length),1);
  return `
  <div class="stats">
    <div class="scard"><div class="sval">${ttl}</div><div class="slbl">Loài hoa</div></div>
    <div class="scard"><div class="sval">${tmb}</div><div class="slbl">Thành viên</div></div>
    <div class="scard"><div class="sval">${ttk}</div><div class="slbl">Lượt tick</div></div>
  </div>
  <div class="card" style="margin-bottom:14px">
    <div style="font-size:.78rem;font-weight:800;color:var(--t4);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px">Hoa theo phẩm màu</div>
    ${COLS.filter(c=>byC[c.k]).map(c=>{
      const n=byC[c.k]||0, pct=ttl?Math.round(n/ttl*100):0;
      return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <span style="width:38px;font-size:.76rem;font-weight:700;color:${c.h}">${c.l}</span>
        <div style="flex:1;height:7px;border-radius:4px;background:var(--g0);overflow:hidden">
          <div style="width:${pct}%;height:100%;border-radius:4px;background:${c.h}"></div>
        </div>
        <span style="font-size:.75rem;font-weight:700;color:var(--t4);width:26px;text-align:right">${n}</span>
      </div>`;
    }).join('')}
  </div>
  <div class="card">
    <div style="font-size:.78rem;font-weight:800;color:var(--t4);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px">Bảng xếp hạng</div>
    ${sorted.length===0?'<div class="empty"><div class="ei">👥</div>Chưa có thành viên</div>':
    '<table class="mtbl"><thead><tr><th>#</th><th>Thành viên</th><th>Tiến độ</th></tr></thead><tbody>'+
    sorted.map((m,i)=>{
      const n=(S.ticks[m.id]||[]).length, pct=S.flowers.length?Math.round(n/S.flowers.length*100):0;
      return `<tr><td style="width:32px;color:var(--t2);font-weight:800">${i+1}</td>
        <td><div style="font-weight:700">${esc(m.displayName)}</div><div style="font-size:.76rem;color:var(--t4)">${m.alias?esc(m.alias):''}${m.year?' · '+m.year:''}</div></td>
        <td><div class="mbar-w"><div class="mbar"><div class="mbar-f" style="width:${pct}%"></div></div><span class="mlbl">${n} hoa</span></div></td>
      </tr>`;
    }).join('')+'</tbody></table>'}
  </div>`;
}

// ── FLOWERS PAGE ────────────────────────────────────────────
function pageFlowers() {
  return (S.admin ? addFlowerForm() : '') +
  `<div class="sbar"><span class="sico">🔍</span>
    <input class="fi" style="padding-left:34px" placeholder="Tìm tên hoa…" value="${esc(S.fq)}" oninput="S.fq=this.value;renderFList()">
  </div>
  <div class="cfbar">
    <span class="ctab ${S.fcolor==='all'?'on':''}" onclick="setFC('all')">Tất cả</span>
    ${COLS.map(c=>`<span class="ctab ${S.fcolor===c.k?'on':''}" style="${S.fcolor===c.k?'background:'+c.h+'18;color:'+c.h+';border-color:'+c.h:''}" onclick="setFC('${c.k}')">${c.l}</span>`).join('')}
  </div>
  <div id="flist">${flistHtml()}</div>`;
}

function setFC(k){ S.fcolor=k; document.querySelectorAll('.ctab').forEach(e=>e.classList.remove('on')); event.target.classList.add('on'); renderFList(); }
function renderFList(){ const el=document.getElementById('flist'); if(el) el.innerHTML=flistHtml(); }

function flistHtml() {
  const q=S.fq.toLowerCase();
  const byC={};
  S.flowers.forEach(f=>{
    if(S.fcolor!=='all'&&f.color!==S.fcolor) return;
    if(q&&!f.name.toLowerCase().includes(q)) return;
    if(!byC[f.color]) byC[f.color]=[];
    byC[f.color].push(f);
  });
  if(!Object.keys(byC).length) return '<div class="empty"><div class="ei">🔍</div>Không tìm thấy hoa nào</div>';
  return COLS.filter(c=>byC[c.k]).map(c=>`
    <div class="gh"><div class="gh-bar" style="background:${c.h}"></div><h2>${c.l}</h2><span class="cnt">${byC[c.k].length}</span></div>
    <div class="fgrid">${byC[c.k].map(f=>flowerCard(f)).join('')}</div>
  `).join('');
}

function flowerCard(f) {
  const owners=getOwners(f.id);
  const c=col(f.color);
  return `<div class="fc">
    ${S.admin?`<button onclick="confirmDelFlower('${f.id}')" style="position:absolute;top:6px;right:6px;z-index:5;background:rgba(255,255,255,.85);border:none;border-radius:50%;width:24px;height:24px;cursor:pointer;color:#ef4444;font-size:12px;display:flex;align-items:center;justify-content:center">✕</button>`:''}
    <div class="img-wrap" style="position:relative">
      ${f.imgUrl
        ? `<img src="${esc(f.imgUrl)}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=\\'no-img\\'><span class=\\'letter\\' style=\\'color:${c.h}\\'>${esc(f.name.charAt(0))}</span><span class=\\'lname\\'>${esc(f.name)}</span></div>'">`
        : `<div class="no-img"><span class="letter" style="color:${c.h}">${esc(f.name.charAt(0))}</span><span class="lname">${esc(f.name)}</span></div>`}
    </div>
    <div class="fbody">
      <div class="fname">${esc(f.name)}</div>
      <span class="badge" style="background:${c.h}18;color:${c.h}"><span class="bdot" style="background:${c.h}"></span>${c.l}</span>
      <div class="fcount">${owners.length?owners.length+' người sở hữu':'Chưa ai'}</div>
      <div class="fowns">${owners.slice(0,5).map(esc).join(', ')}${owners.length>5?'…':''}</div>
    </div>
  </div>`;
}

function getOwners(fid){ return S.members.filter(m=>(S.ticks[m.id]||[]).includes(fid)).map(m=>m.displayName); }

// add flower form
let _ac='';
function addFlowerForm(){
  return `<div class="card" style="margin-bottom:18px">
    <div style="font-size:.85rem;font-weight:800;color:var(--t6);margin-bottom:12px">➕ Thêm hoa mới</div>
    <div class="frow">
      <div class="fg" style="grid-column:1/-1"><label class="fl">Tên hoa</label><input class="fi" id="af-n" placeholder="Ví dụ: Hoa anh thảo xanh"></div>
      <div class="fg"><label class="fl">Phẩm màu</label>
        <div class="cpick">${COLS.map(c=>`<span class="copt" id="cp-${c.k}" onclick="pickC('${c.k}')">${c.l}</span>`).join('')}</div>
      </div>
      <div class="fg"><label class="fl">URL ảnh <span style="color:var(--t2);font-weight:400">(tuỳ chọn)</span></label><input class="fi" id="af-i" placeholder="https://..."></div>
    </div>
    <div style="margin-top:12px"><button class="btn btn-g" id="af-btn" onclick="doAddFlower()">Thêm hoa</button></div>
  </div>`;
}

function pickC(k){
  _ac=k; const c=col(k);
  document.querySelectorAll('.copt').forEach(e=>{ e.style.cssText=''; e.className='copt'; });
  const el=document.getElementById('cp-'+k);
  if(el){ el.style.background=c.h+'20'; el.style.color=c.h; el.style.borderColor=c.h; el.style.borderWidth='2px'; }
}

async function doAddFlower(){
  const name=document.getElementById('af-n')?.value.trim();
  const imgUrl=document.getElementById('af-i')?.value.trim();
  if(!name){ toast('Nhập tên hoa!','wn'); return; }
  if(!_ac){ toast('Chọn phẩm màu!','wn'); return; }
  const btn=document.getElementById('af-btn'); btn.disabled=true; btn.innerHTML='<div class="sp"></div>';
  const id='f'+Date.now();
  const r=await sPost('Flowers',{id,name,color:_ac,imgUrl:imgUrl||'',sortOrder:S.flowers.length+1});
  if(!r||r.error){ toast((r&&r.error)||'Lỗi kết nối','er'); btn.disabled=false; btn.innerHTML='Thêm hoa'; return; }
  toast('Đã thêm: '+name); _ac=''; await loadAll(); render();
}

async function confirmDelFlower(id){
  const f=S.flowers.find(x=>x.id===id);
  openModal('⚠️ Xóa hoa',`Xóa <b>${esc(f?.name||id)}</b>? Dữ liệu tick cũng bị xóa.`,
    `<button class="btn btn-o" onclick="closeModal()">Hủy</button><button class="btn btn-r" onclick="doDelFlower('${id}')">Xóa</button>`);
}
async function doDelFlower(id){
  closeModal();
  await sDel('Flowers','id',id);
  const aff=Object.entries(S.ticks).filter(([,ids])=>ids.includes(id));
  await Promise.all(aff.map(([mid,ids])=>sPatch('Ticks','memberId',mid,{flowerIds:ids.filter(x=>x!==id).join(',')})));
  toast('Đã xóa hoa'); await loadAll(); render();
}

// ── TICK PAGE ───────────────────────────────────────────────
function pageTick(){
  const opts=S.members.map(m=>`<option value="${m.id}" ${m.id===S.mid?'selected':''}>${esc(m.displayName)}${m.alias?' - '+m.alias:''}${m.year?' ('+m.year+')':''}</option>`).join('');
  return `
  <div class="card" style="margin-bottom:16px;display:flex;gap:10px;align-items:center;flex-wrap:wrap">
    <label class="fl" style="white-space:nowrap">Bạn là:</label>
    <select class="fi" style="flex:1;min-width:180px;max-width:320px" onchange="onMember(this.value)">
      <option value="">-- Chọn thành viên --</option>${opts}
    </select>
    ${S.mid?`<span style="background:var(--pkl);color:var(--pkd);padding:4px 11px;border-radius:var(--rp);font-size:.76rem;font-weight:700;white-space:nowrap">🌸 ${S.msel.size} hoa</span>`:''}
  </div>
  ${!S.mid
    ? '<div class="empty"><div class="ei">👆</div>Chọn tên bạn để bắt đầu tick</div>'
    : `<div class="sbar"><span class="sico">🔍</span><input class="fi" style="padding-left:34px" placeholder="Tìm hoa để tick…" oninput="renderTList(this.value)"></div>
       <div id="tlist">${tlistHtml('')}</div>`
  }`;
}

function onMember(id){
  S.mid=id; S.msel=id?new Set(S.ticks[id]||[]):new Set();
  render();
}

function tlistHtml(q){
  const lq=(q||'').toLowerCase();
  const byC={};
  S.flowers.forEach(f=>{ if(!lq||f.name.toLowerCase().includes(lq)){if(!byC[f.color])byC[f.color]=[];byC[f.color].push(f);} });
  if(!Object.keys(byC).length) return '<div class="empty"><div class="ei">🔍</div>Không tìm thấy</div>';
  return COLS.filter(c=>byC[c.k]).map(c=>`
    <div class="gh"><div class="gh-bar" style="background:${c.h}"></div><h2>${c.l}</h2><span class="cnt">${byC[c.k].length}</span></div>
    <div class="fgrid">${byC[c.k].map(f=>{
      const tk=S.msel.has(f.id); const cv=col(f.color);
      return `<div class="fc tc ${tk?'ticked':''}" onclick="toggleTick('${f.id}')">
        <div class="img-wrap" style="position:relative">
          ${f.imgUrl?`<img src="${esc(f.imgUrl)}" loading="lazy">`:`<div class="no-img"><span class="letter" style="color:${cv.h}">${esc(f.name.charAt(0))}</span><span class="lname">${esc(f.name)}</span></div>`}
          <div class="chk" id="chk-${f.id}">${tk?'✓':''}</div>
        </div>
        <div class="fbody"><div class="fname">${esc(f.name)}</div>
          <span class="badge" style="background:${cv.h}18;color:${cv.h}"><span class="bdot" style="background:${cv.h}"></span>${cv.l}</span>
        </div>
      </div>`;
    }).join('')}</div>
  `).join('');
}

function renderTList(q){ const el=document.getElementById('tlist'); if(el) el.innerHTML=tlistHtml(q); }

function toggleTick(id){
  if(!S.mid){ toast('Chọn tên trước!','wn'); return; }
  S.msel.has(id)?S.msel.delete(id):S.msel.add(id);
  const card=document.querySelector(`.tc[onclick="toggleTick('${id}')"]`);
  if(card){ card.classList.toggle('ticked',S.msel.has(id)); const c=card.querySelector('.chk'); if(c) c.textContent=S.msel.has(id)?'✓':''; }
  const bc=document.querySelector('.savebar span strong'); if(bc) bc.textContent=S.msel.size;
  const badge=document.querySelector('[style*="pkl"]'); if(badge) badge.textContent='🌸 '+S.msel.size+' hoa';
}

async function saveTicks(){
  if(!S.mid){ toast('Chọn thành viên trước!','wn'); return; }
  const btn=document.getElementById('sbtn'); btn.disabled=true; btn.innerHTML='<div class="sp"></div>';
  const fids=[...S.msel].join(',');
  const exists=S.ticks.hasOwnProperty(S.mid);
  const r=exists ? await sPatch('Ticks','memberId',S.mid,{flowerIds:fids}) : await sPost('Ticks',{memberId:S.mid,flowerIds:fids});
  if(r&&!r.error){ S.ticks[S.mid]=[...S.msel]; toast('Lưu thành công! 🌸'); }
  else toast((r&&r.error)||'Lỗi kết nối','er');
  btn.disabled=false; btn.innerHTML='💾 Lưu';
}

// ── MEMBERS PAGE ────────────────────────────────────────────
function pageMembers(){
  const sorted=[...S.members].sort((a,b)=>(S.ticks[b.id]||[]).length-(S.ticks[a.id]||[]).length);
  return (S.admin?addMemberForm():'')+
  `<div class="card">
    ${sorted.length===0?'<div class="empty"><div class="ei">👥</div>Chưa có thành viên</div>':
    '<table class="mtbl"><thead><tr><th>#</th><th>Thành viên</th><th>Sở hữu</th>'+(S.admin?'<th></th>':'')+'</tr></thead><tbody>'+
    sorted.map((m,i)=>{
      const n=(S.ticks[m.id]||[]).length, pct=S.flowers.length?Math.round(n/S.flowers.length*100):0;
      return `<tr><td style="color:var(--t2);font-weight:800;width:30px">${i+1}</td>
        <td><div style="font-weight:700">${esc(m.displayName)}</div><div style="font-size:.75rem;color:var(--t4)">${m.alias?esc(m.alias):''}${m.year?' · '+m.year:''}</div></td>
        <td><div class="mbar-w"><div class="mbar"><div class="mbar-f" style="width:${pct}%"></div></div><span class="mlbl">${n}/${S.flowers.length}</span></div></td>
        ${S.admin?`<td><button class="ibtn del" onclick="confirmDelMember('${m.id}')">🗑️</button></td>`:''}
      </tr>`;
    }).join('')+'</tbody></table>'}
  </div>`;
}

function addMemberForm(){
  return `<div class="card" style="margin-bottom:16px">
    <div style="font-size:.85rem;font-weight:800;color:var(--t6);margin-bottom:12px">➕ Thêm thành viên</div>
    <div class="frow">
      <div class="fg"><label class="fl">Tên hiển thị</label><input class="fi" id="am-d" placeholder="Khánh Ly"></div>
      <div class="fg"><label class="fl">Tên game</label><input class="fi" id="am-a" placeholder="Mẫn"></div>
      <div class="fg"><label class="fl">Năm sinh</label><input class="fi" id="am-y" placeholder="1991" maxlength="4"></div>
    </div>
    <div style="margin-top:12px"><button class="btn btn-g" id="am-btn" onclick="doAddMember()">Thêm</button></div>
  </div>`;
}

async function doAddMember(){
  const d=document.getElementById('am-d')?.value.trim();
  const a=document.getElementById('am-a')?.value.trim();
  const y=document.getElementById('am-y')?.value.trim();
  if(!d){ toast('Nhập tên!','wn'); return; }
  if(S.members.find(m=>m.displayName===d&&m.alias===(a||''))){ toast('Thành viên đã tồn tại','wn'); return; }
  const btn=document.getElementById('am-btn'); btn.disabled=true; btn.innerHTML='<div class="sp"></div>';
  const r=await sPost('Members',{id:'m'+Date.now(),displayName:d,alias:a||'',year:y||''});
  if(!r||r.error){ toast((r&&r.error)||'Lỗi','er'); btn.disabled=false; btn.innerHTML='Thêm'; return; }
  toast('Đã thêm: '+d); await loadAll(); render();
}

async function confirmDelMember(id){
  const m=S.members.find(x=>x.id===id);
  openModal('⚠️ Xóa thành viên',`Xóa <b>${esc(m?.displayName||id)}</b>? Dữ liệu tick cũng bị xóa.`,
    `<button class="btn btn-o" onclick="closeModal()">Hủy</button><button class="btn btn-r" onclick="doDelMember('${id}')">Xóa</button>`);
}
async function doDelMember(id){
  closeModal();
  await sDel('Members','id',id);
  await sDel('Ticks','memberId',id);
  if(S.mid===id){ S.mid=''; S.msel=new Set(); }
  toast('Đã xóa thành viên'); await loadAll(); render();
}

// ── SETTINGS PAGE ───────────────────────────────────────────
function pageSettings(){
  return `<div class="card" style="margin-bottom:12px">
    <div style="font-size:.85rem;font-weight:800;color:var(--t6);margin-bottom:10px">🔗 SheetDB URL</div>
    <div class="irow">
      <input class="fi" id="cfg-u" value="${esc(URL)}" placeholder="https://sheetdb.io/api/v1/...">
      <button class="btn btn-g" onclick="updateUrl()">Lưu</button>
    </div>
    <p style="font-size:.76rem;color:var(--t2);margin-top:8px">Lấy URL tại sheetdb.io sau khi kết nối Google Sheets.</p>
  </div>
  <div class="card" style="margin-bottom:12px">
    <div style="font-size:.85rem;font-weight:800;color:var(--t6);margin-bottom:10px">🛠️ Header cần có trong Sheets</div>
    <div style="font-size:.82rem;color:var(--t6);line-height:2">
      <b>Flowers:</b> <code style="background:var(--g1);padding:1px 5px;border-radius:4px">id | name | color | imgUrl | sortOrder</code><br>
      <b>Members:</b> <code style="background:var(--g1);padding:1px 5px;border-radius:4px">id | displayName | alias | year</code><br>
      <b>Ticks:</b> <code style="background:var(--g1);padding:1px 5px;border-radius:4px">memberId | flowerIds</code>
    </div>
  </div>
  <div class="card">
    <button class="btn btn-g" onclick="retry()">🔄 Tải lại dữ liệu</button>
    &nbsp;
    <button class="btn btn-r btn-sm" style="margin-top:8px" onclick="confirmReset()">🔌 Ngắt kết nối</button>
  </div>`;
}

async function updateUrl(){
  const v=document.getElementById('cfg-u').value.trim();
  if(!v){ return; } URL=v; localStorage.setItem(CK,URL);
  toast('Đã cập nhật URL'); await loadAll(); render();
}

function confirmReset(){
  openModal('🔌 Ngắt kết nối','Xóa URL và quay về màn hình cài đặt?',
    '<button class="btn btn-o" onclick="closeModal()">Hủy</button>'+
    '<button class="btn btn-r" onclick="doReset()">Ngắt</button>');
}
function doReset(){ closeModal(); URL=''; localStorage.removeItem(CK); S={...S,loaded:false,err:null,flowers:[],members:[],ticks:{},page:'dash',mid:'',msel:new Set()}; render(); }

// ── UTILS ───────────────────────────────────────────────────
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── INIT ────────────────────────────────────────────────────
async function init(){
  render();
  if(URL){ await loadAll(); render(); }
}
init();
</script>
</body>
</html>
