<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌺 Hoa Viên</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=Noto+Serif+SC:wght@500;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="ribbon-addon.css">
</head>
<body>
<div id="bg-layer" aria-hidden="true"></div>
<div id="bg-overlay" aria-hidden="true"></div>
<div class="toasts" id="toasts"></div>
<div class="mbg" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="mbox">
    <div class="mttl" id="mttl"></div>
    <div class="mbdy" id="mbdy"></div>
    <div class="mft" id="mft"></div>
  </div>
</div>
<div class="zoom-bg" id="zoomBg" onclick="if(event.target===this)closeZoom()">
  <div class="zoom-card" id="zoomCard" onclick="closeZoom()"></div>
</div>
<div class="mf-bg" id="mfBg" onclick="if(event.target===this)closeMemberFlowers()">
  <div class="mf-card" id="mfCard"></div>
</div>
<div class="savebar" id="savebar">
  <span style="font-size:.86rem;font-weight:600;color:#a5d6a7">Đã chọn <strong id="sbc" style="color:#fff">0</strong> hoa</span>
  <button class="btn btn-p" id="sbtn" onclick="saveTicks()">💾 Lưu</button>
</div>

<div class="bar">
  <span style="font-size:1.4rem">🌺</span>
  <span class="bar-logo">Hoa Viên</span>
  <div class="bar-sp"></div>
  <div class="bar-sync"><div class="pulse" id="pulse"></div><span id="synclbl">Kết nối</span></div>
  <div id="bar-guide-area"></div>
  <div id="bar-user-area"></div>
</div>

<div id="announcement-area"></div>

<button id="scroll-top-btn" onclick="window.scrollTo({top:0,behavior:'smooth'})" title="Lên đầu trang" aria-label="Lên đầu trang">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
  <span>Lên đầu</span>
</button>

<div class="wrap" id="app"></div>

<script type="module" src="js/22-main.js"></script>
<script>
/* ═══════════════════════════════════════════════════════
   Hoa Viên — Background Loader v2
   Ưu tiên: IndexedDB cache → CDN fetch → CSS fallback
   Hỗ trợ xoay màn hình (orientationchange + resize)
   ═══════════════════════════════════════════════════════ */
(function () {
  var CDN_MOBILE  = 'https://cdn.jsdelivr.net/gh/transonyla/hoavien-img@main/images/1782448451652-052kvsgu.webp';
  var CDN_DESKTOP = 'https://cdn.jsdelivr.net/gh/transonyla/hoavien-img@main/images/1782448993224-kc9v66qo.webp';
  var DB_NAME = 'hv-bg-cache';
  var DB_VER  = 1;
  var STORE   = 'images';

  /* Desktop = width >= 769px — đồng bộ với CSS media query @media(min-width:769px) */
  function isDesktopView() {
    return window.innerWidth >= 769;
  }

  /* Revoke objectURL cũ trước khi apply mới tránh memory leak */
  var _currentObjUrl = null;
  var _bgLayer = document.getElementById('bg-layer');

  function applyBg(url) {
    if (_currentObjUrl && _currentObjUrl.startsWith('blob:')) {
      URL.revokeObjectURL(_currentObjUrl);
    }
    _currentObjUrl = url;
    if (_bgLayer) _bgLayer.style.backgroundImage = 'url("' + url + '")';
    document.body.classList.add('bg-loaded');
  }

  function openDB(cb) {
    try {
      var req = indexedDB.open(DB_NAME, DB_VER);
      req.onupgradeneeded = function (e) { e.target.result.createObjectStore(STORE); };
      req.onsuccess = function (e) { cb(null, e.target.result); };
      req.onerror   = function ()  { cb('err', null); };
    } catch(e) { cb('err', null); }
  }

  function getCache(db, key, cb) {
    try {
      var req = db.transaction(STORE, 'readonly').objectStore(STORE).get(key);
      req.onsuccess = function (e) { cb(e.target.result || null); };
      req.onerror   = function ()  { cb(null); };
    } catch(e) { cb(null); }
  }

  function putCache(db, key, blob) {
    try { db.transaction(STORE, 'readwrite').objectStore(STORE).put(blob, key); } catch(e) {}
  }

  function cleanOldKeys(db) {
    var valid = [CDN_MOBILE, CDN_DESKTOP];
    try {
      var tx  = db.transaction(STORE, 'readwrite');
      var req = tx.objectStore(STORE).getAllKeys();
      req.onsuccess = function (e) {
        (e.target.result || []).forEach(function(k) {
          if (valid.indexOf(k) === -1) tx.objectStore(STORE).delete(k);
        });
      };
    } catch(e) {}
  }

  function fetchAndCache(db, cdnUrl, fallbackApplied) {
    fetch(cdnUrl)
      .then(function (res) { if (!res.ok) throw 0; return res.blob(); })
      .then(function (blob) {
        if (db) putCache(db, cdnUrl, blob);
        applyBg(URL.createObjectURL(blob));
      })
      .catch(function () {
        /* CDN lỗi + không có cache → không add bg-loaded, giữ CSS gốc */
      });
  }

  /* Cache DB dùng chung, mở 1 lần */
  var _db = null;
  function withDB(cb) {
    if (_db) { cb(_db); return; }
    openDB(function(err, db) { _db = db || null; cb(_db); });
  }

  function switchBg(cdnUrl) {
    withDB(function(db) {
      if (!db) { fetchAndCache(null, cdnUrl); return; }
      cleanOldKeys(db);
      getCache(db, cdnUrl, function(cached) {
        if (cached) applyBg(URL.createObjectURL(cached));
        else fetchAndCache(db, cdnUrl);
      });
    });
  }

  /* Load lần đầu */
  switchBg(isDesktopView() ? CDN_DESKTOP : CDN_MOBILE);

  /* Xoay màn hình — dùng orientationchange cho mobile, resize cho desktop */
  var _lastDesktop = isDesktopView();
  function onOrientationChange() {
    setTimeout(function() {
      var nowDesktop = isDesktopView();
      /* CSS @media(min-width:769px) tự xử lý background-position, không cần inline override */
      if (nowDesktop !== _lastDesktop) {
        _lastDesktop = nowDesktop;
        switchBg(nowDesktop ? CDN_DESKTOP : CDN_MOBILE);
      }
    }, 150);
  }

  window.addEventListener('orientationchange', onOrientationChange);
  window.addEventListener('resize', onOrientationChange);
})();
</script>
</body>
</html>
